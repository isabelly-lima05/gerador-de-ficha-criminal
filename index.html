<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARQUIVO NEXUS // Análise Criminológica Avançada</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --bg-deep: #080a0f;
            --bg-card: rgba(15, 22, 36, 0.96);
            --accent-blue: #0284c7;
            --accent-glow: rgba(2, 132, 199, 0.15);
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --border-subtle: rgba(2, 132, 199, 0.2);
            --border-focus: rgba(2, 132, 199, 0.6);
            --input-bg: #0b0f17;
            --viewport-bg: rgba(11, 15, 23, 0.7);
            --title-color: #f8fafc;
            --paragraph-color: #cbd5e1;
            --shadow-intensity: rgba(0, 0, 0, 0.6);
            --tab-active: rgba(2, 132, 199, 0.1);
            
            --transition-smooth: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        body.light-theme {
            --bg-deep: #f8fafc;
            --bg-card: rgba(255, 255, 255, 0.98);
            --accent-blue: #0369a1;
            --accent-glow: rgba(3, 105, 161, 0.1);
            --text-main: #0f172a;
            --text-muted: #475569;
            --border-subtle: rgba(3, 105, 161, 0.2);
            --border-focus: rgba(3, 105, 161, 0.5);
            --input-bg: #f1f5f9;
            --viewport-bg: rgba(241, 245, 249, 0.75);
            --title-color: #0f172a;
            --paragraph-color: #334155;
            --shadow-intensity: rgba(148, 163, 184, 0.2);
            --tab-active: rgba(3, 105, 161, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            overflow-x: hidden;
            transition: var(--transition-smooth);
        }

        .app-container {
            width: 100%;
            max-width: 1400px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 25px 60px var(--shadow-intensity);
            display: grid;
            grid-template-columns: 360px 1fr;
            grid-template-rows: auto 1fr;
            gap: 30px;
            transition: var(--transition-smooth);
        }

        @media (min-width: 961px) {
            .app-container {
                height: 92vh;
                max-height: 940px;
            }
        }

        @media (max-width: 960px) {
            .app-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto;
                padding: 20px;
                gap: 20px;
            }
        }

        /* HEADER */
        header {
            grid-column: 1 / -1;
            border-bottom: 1px solid var(--border-subtle);
            padding-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--title-color);
        }

        h1 span {
            color: var(--accent-blue);
        }

        .subtitle {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
            margin-top: 4px;
            font-family: 'JetBrains Mono', monospace;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .theme-toggle {
            background-color: var(--toggle-bg);
            border: 1px solid var(--border-subtle);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.65rem;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: var(--transition-smooth);
        }

        .theme-toggle:hover {
            border-color: var(--accent-blue);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .status-panel {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: var(--text-muted);
            border-radius: 50%;
        }

        .status-dot.active {
            background-color: var(--accent-blue);
            box-shadow: 0 0 10px var(--accent-blue);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* SIDEBAR DE PESQUISA */
        .sidebar {
            grid-column: 1;
            grid-row: 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        input[type="text"] {
            background-color: var(--input-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 4px;
            color: var(--text-main);
            padding: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            width: 100%;
            transition: var(--transition-smooth);
        }

        input[type="text"]:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .btn-submit {
            background-color: var(--accent-blue);
            color: #ffffff;
            border: none;
            border-radius: 4px;
            padding: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .btn-submit:hover:not(:disabled) {
            filter: brightness(1.1);
            box-shadow: 0 6px 15px var(--accent-glow);
        }

        .btn-submit:disabled {
            background-color: var(--toggle-bg);
            color: var(--text-muted);
            border: 1px solid var(--border-subtle);
            cursor: not-allowed;
        }

        /* NAVEGAÇÃO INTERNA DO DOSSIÊ (ÍNDICE) */
        .dossier-index {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 10px;
            border-top: 1px solid var(--border-subtle);
            padding-top: 15px;
        }

        .index-title {
            font-size: 0.6rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .index-item {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            padding: 10px 14px;
            text-align: left;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .index-item.active {
            color: var(--accent-blue);
            border-color: var(--border-subtle);
            background-color: var(--tab-active);
            font-weight: 700;
        }

        .index-item:hover:not(.active) {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.02);
        }

        /* CONTAINER DE RELATÓRIO */
        .reading-panel {
            grid-column: 2;
            grid-row: 2;
            background-color: var(--viewport-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: var(--transition-smooth);
        }

        @media (max-width: 960px) {
            .reading-panel {
                height: 600px;
            }
        }

        .reading-panel-header {
            padding: 14px 24px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .btn-text-action {
            background: transparent;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 4px;
            transition: var(--transition-smooth);
            display: none;
        }

        .btn-text-action:hover {
            background-color: var(--accent-blue);
            color: #ffffff;
            box-shadow: 0 4px 10px var(--accent-glow);
        }

        .viewport-content {
            padding: 30px;
            overflow-y: auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .placeholder-text {
            color: var(--text-muted);
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
            margin: auto;
            max-width: 420px;
            line-height: 1.8;
        }

        /* RENDERIZADOR DAS SEÇÕES DO DOSSIÊ */
        .dossier-layout {
            animation: fadeIn 0.4s ease-out;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header-dossier {
            border-bottom: 2px solid var(--accent-blue);
            padding-bottom: 15px;
        }

        .header-dossier-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            color: var(--title-color);
            font-weight: 700;
        }

        .header-dossier-meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent-blue);
            margin-top: 4px;
        }

        /* METRIC CARDS */
        .grid-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .metric-card {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px dashed var(--border-subtle);
            border-radius: 4px;
            padding: 14px;
        }

        .metric-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .metric-value {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--title-color);
            line-height: 1.4;
        }

        /* TEXT BLOCK */
        .block-text {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .block-header {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--accent-blue);
            border-left: 3px solid var(--accent-blue);
            padding-left: 8px;
            font-weight: 700;
        }

        .block-body {
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--paragraph-color);
            text-align: justify;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ERROR CARD */
        .error-card {
            border: 1px solid #ef4444;
            background: rgba(239, 68, 68, 0.05);
            padding: 24px;
            border-radius: 4px;
            max-width: 450px;
            margin: auto;
            text-align: center;
        }

        .error-title {
            color: #ef4444;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .error-desc {
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text-main);
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-subtle);
            border-radius: 2px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-blue);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div>
                <h1>ARQUIVO NEXUS <span>//</span></h1>
                <span class="subtitle">Análise Forense e Dossiês Criminais de interesse público</span>
            </div>
            
            <div class="header-controls">
                <button class="theme-toggle" id="themeToggle">Modo Claro</button>
                <div class="status-panel">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">Terminal Ocioso</span>
                </div>
            </div>
        </header>

        <aside class="sidebar">
            <div class="input-group">
                <label for="nome_pesquisa">Nome da Figura Pública</label>
                <input type="text" id="nome_pesquisa" placeholder="Ex: Ted Bundy, Fernandinho Beira-Mar..." autocomplete="off">
            </div>

            <button class="btn-submit" id="btnConsultar">Executar Varredura</button>

            <!-- Menu de Navegação Rápida das Seções (Inserido Dinamicamente) -->
            <div class="dossier-index" id="dossierIndex" style="display: none;">
                <span class="index-title">Seções do Dossiê</span>
                <button class="index-item active" onclick="switchSection('geral')">01 // Ficha Geral</button>
                <button class="index-item" onclick="switchSection('origem')">02 // Histórico Familiar</button>
                <button class="index-item" onclick="switchSection('atividades')">03 // Atividade Criminal</button>
                <button class="index-item" onclick="switchSection('captura')">04 // Investigação & Júri</button>
                <button class="index-item" onclick="switchSection('custodia')">05 // Custódia & Regime</button>
                <button class="index-item" onclick="switchSection('impacto')">06 // Impacto & Mídia</button>
            </div>
        </aside>

        <main class="reading-panel">
            <div class="reading-panel-header">
                <span>Dossiê Consolidado</span>
                <button class="btn-text-action" id="btnPDF">Exportar Relatório Geral (PDF)</button>
            </div>
            
            <div class="viewport-content" id="viewport">
                <div class="placeholder-text">
                    Aguardando entrada de pesquisa. Insira o nome de um indivíduo relevante para levantar e consolidar o histórico carcerário estruturado.
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:5000/generate";
        let dossieAtivo = null;

        // Toggle do Tema
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            themeToggle.innerText = isLight ? "Modo Escuro" : "Modo Claro";
        });

        // Eventos de Busca
        const btnConsultar = document.getElementById('btnConsultar');
        const inputPesquisa = document.getElementById('nome_pesquisa');

        btnConsultar.addEventListener('click', consultarCaso);
        inputPesquisa.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') consultarCaso();
        });

        async function consultarCaso() {
            const nome_pesquisa = inputPesquisa.value.trim();
            if (!nome_pesquisa) {
                alert("Insira um nome válido para pesquisa.");
                return;
            }

            const viewport = document.getElementById('viewport');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const btnPDF = document.getElementById('btnPDF');
            const indexMenu = document.getElementById('dossierIndex');

            btnConsultar.disabled = true;
            btnConsultar.innerText = "Consultando...";
            btnPDF.style.display = 'none';
            indexMenu.style.display = 'none';
            statusDot.classList.add('active');
            statusText.innerText = "Rastreando base criminológica...";
            viewport.innerHTML = `<div class="placeholder-text">Extraindo dados biográficos, modus operandi, sentenças e registros penais...</div>`;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome_pesquisa })
                });

                const rData = await response.json();

                if (rData.status === "success") {
                    const dados = rData.dados;
                    if (dados.pesquisa_valida) {
                        dossieAtivo = dados;
                        indexMenu.style.display = 'flex';
                        btnPDF.style.display = 'block';
                        switchSection('geral');
                    } else {
                        viewport.innerHTML = `
                            <div class="error-card">
                                <div class="error-title">Consulta Negada</div>
                                <div class="error-desc">${dados.justificativa_invalida || "O alvo não atende aos pré-requisitos de figura penal de interesse público."}</div>
                            </div>
                        `;
                    }
                } else {
                    throw new Error(rData.message || "Instabilidade no sistema do servidor.");
                }

            } catch (error) {
                console.error(error);
                viewport.innerHTML = `
                    <div class="error-card">
                        <div class="error-title">Erro de Processamento</div>
                        <div class="error-desc">Não foi possível estabelecer contato com o processador. Erro: <strong>${error.message}</strong>.</div>
                    </div>
                `;
            } finally {
                btnConsultar.disabled = false;
                btnConsultar.innerText = "Executar Varredura";
                statusDot.classList.remove('active');
                statusText.innerText = "Terminal Ocioso";
            }
        }

        // Navegação por Seções do Dossiê
        function switchSection(secao) {
            if (!dossieAtivo) return;

            // Gerencia classes Ativas do menu lateral
            const items = document.querySelectorAll('.index-item');
            items.forEach(btn => btn.classList.remove('active'));

            const viewport = document.getElementById('viewport');
            viewport.innerHTML = "";

            let contentHTML = "";

            // Cabeçalho Padrão para manter a identidade do indivíduo selecionado
            const cabecalhoHTML = `
                <div class="header-dossier">
                    <div class="header-dossier-title">${dossieAtivo.nome_completo}</div>
                    <div class="header-dossier-meta">Alcunha(s): ${dossieAtivo.alcunhas_pseudonimos || 'Nenhuma registrada oficialmente'}</div>
                </div>
            `;

            switch (secao) {
                case 'geral':
                    items[0].classList.add('active');
                    contentHTML = `
                        ${cabecalhoHTML}
                        <div class="grid-metrics">
                            <div class="metric-card">
                                <div class="metric-label">Identidade Registrada</div>
                                <div class="metric-value">${dossieAtivo.nome_completo}</div>
                            </div>
                            <div class="metric-card">
                                <div class="metric-label">Dados Biográficos Gerais</div>
                                <div class="metric-value">${dossieAtivo.dados_biograficos_basicos}</div>
                            </div>
                        </div>
                        <div class="block-text">
                            <div class="block-header">Resumo do Caso</div>
                            <div class="block-body">${dossieAtivo.resumo_caso}</div>
                        </div>
                    `;
                    break;
                case 'origem':
                    items[1].classList.add('active');
                    contentHTML = `
                        ${cabecalhoHTML}
                        <div class="block-text">
                            <div class="block-header">Histórico Familiar & Infância</div>
                            <div class="block-body">${dossieAtivo.infancia_desenvolvimento}</div>
                        </div>
                        <div class="block-text">
                            <div class="block-header">Primeiros Desvios & Delitos</div>
                            <div class="block-body">${dossieAtivo.antecedentes_primeiros_delitos}</div>
                        </div>
                    `;
                    break;
                case 'atividades':
                    items[2].classList.add('active');
                    contentHTML = `
                        ${cabecalhoHTML}
                        <div class="block-text">
                            <div class="block-header">Cronologia Criminal de Atos Principais</div>
                            <div class="block-body">${dossieAtivo.cronologia_crimes_principais}</div>
                        </div>
                        <div class="block-text">
                            <div class="block-header">Modus Operandi de Atuação</div>
                            <div class="block-body">${dossieAtivo.modus_operandi_tecnico}</div>
                        </div>
                        <div class="block-text">
                            <div class="block-header">Perfil Psiquiátrico / Comportamental Mapeado</div>
                            <div class="block-body">${dossieAtivo.perfil_psicologico_diagnostico}</div>
                        </div>
                    `;
                    break;
                case 'captura':
                    items[3].classList.add('active');
                    contentHTML = `
                        ${cabecalhoHTML}
                        <div class="block-text">
                            <div class="block-header">Investigação Policial & Captura</div>
                            <div class="block-body">${dossieAtivo.investigacao_captura}</div>
                        </div>
                        <div class="block-text">
                            <div class="block-header">Julgamento e Sentença Fixada</div>
                            <div class="block-body">${dossieAtivo.processo_julgamento_sentenca}</div>
                        </div>
                    `;
                    break;
                case 'custodia':
                    items[4].classList.add('active');
                    contentHTML = `
                        ${cabecalhoHTML}
                        <div class="grid-metrics">
                            <div class="metric-card">
                                <div class="metric-label">Regime Penal de Custódia</div>
                                <div class="metric-value">${dossieAtivo.regime_atual}</div>
                            </div>
                            <div class="metric-card">
                                <div class="metric-label">Dosimetria Total da Pena</div>
                                <div class="metric-value">${dossieAtivo.anos_condenacao}</div>
                            </div>
                        </div>
                        <div class="block-text">
                            <div class="block-header">Conduta Prisional</div>
                            <div class="block-body">${dossieAtivo.vida_carceraria_comportamento}</div>
                        </div>
                        <div class="block-text">
                            <div class="block-header">Situação do Indivíduo no Presente</div>
                            <div class="block-body">${dossieAtivo.situacao_atual_hoje}</div>
                        </div>
                    `;
                    break;
                case 'impacto':
                    items[5].classList.add('active');
                    contentHTML = `
                        ${cabecalhoHTML}
                        <div class="block-text">
                            <div class="block-header">Impacto Sociocultural, Jurídico & Legado</div>
                            <div class="block-body">${dossieAtivo.impacto_social_legado}</div>
                        </div>
                    `;
                    break;
            }

            viewport.innerHTML = `<div class="dossier-layout">${contentHTML}</div>`;
            viewport.scrollTop = 0;
        }

        // Geração Unificada do Relatório PDF Completo
        document.getElementById('btnPDF').addEventListener('click', () => {
            if (!dossieAtivo) return;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({
                orientation: 'p',
                unit: 'mm',
                format: 'a4'
            });

            const margin = 20;
            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();
            const maxLineWidth = pageWidth - (margin * 2);
            let currentY = 25;

            // Cabeçalho estrutural de arquivo
            doc.setFont("courier", "bold");
            doc.setFontSize(14);
            doc.text("ARQUIVO NEXUS // SISTEMA FORENSE", margin, currentY);
            currentY += 6;
            doc.setFontSize(9);
            doc.text(`REGISTRO COMPLETO DE EXPEDIÇÃO PENAL: ${dossieAtivo.nome_completo.toUpperCase()}`, margin, currentY);
            currentY += 4;
            doc.line(margin, currentY, pageWidth - margin, currentY);
            currentY += 10;

            const structuredData = [
                { label: "NOME COMPLETO", val: dossieAtivo.nome_completo },
                { label: "ALCUNHAS E COGNOMES", val: dossieAtivo.alcunhas_pseudonimos },
                { label: "DADOS BIOGRAFICOS", val: dossieAtivo.dados_biograficos_basicos },
                { label: "RESUMO GERAL", val: dossieAtivo.resumo_caso },
                { label: "INFANCIA E AMBIENTE FAMILIAR", val: dossieAtivo.infancia_desenvolvimento },
                { label: "ANTECEDENTES E PRIMEIRAS ANOMALIAS", val: dossieAtivo.antecedentes_primeiros_delitos },
                { label: "CRONOLOGIA CRIMINAL DETALHADA", val: dossieAtivo.cronologia_crimes_principais },
                { label: "METODOLOGIA E MODUS OPERANDI", val: dossieAtivo.modus_operandi_tecnico },
                { label: "PERFIL PSICOLOGICO E PSIQUIATRICO", val: dossieAtivo.perfil_psicologico_diagnostico },
                { label: "INVESTIGACAO E OPERACAO DE CAPTURA", val: dossieAtivo.investigacao_captura },
                { label: "JULGAMENTO, DEFESA E SENTENCA", val: dossieAtivo.processo_julgamento_sentenca },
                { label: "COMPORTAMENTO CARCERARIO", val: dossieAtivo.vida_carceraria_comportamento },
                { label: "REGIME ATUAL DE CUMPRIMENTO", val: dossieAtivo.regime_atual },
                { label: "TOTAL DA PENA", val: dossieAtivo.anos_condenacao },
                { label: "SITUACAO ATUAL HOJE", val: dossieAtivo.situacao_atual_hoje },
                { label: "REPERCUSSAO SOCIAL E MUDANCAS LEGAIS", val: dossieAtivo.impacto_social_legado }
            ];

            doc.setFont("courier", "normal");
            doc.setFontSize(9.5);

            structuredData.forEach(section => {
                if (!section.val) return;

                // Margens e controle de altura
                if (currentY > pageHeight - 25) {
                    doc.addPage();
                    currentY = 20;
                }

                doc.setFont("courier", "bold");
                doc.text(`[${section.label}]`, margin, currentY);
                currentY += 5;

                doc.setFont("courier", "normal");
                const splitText = doc.splitTextToSize(section.val, maxLineWidth);
                
                splitText.forEach(line => {
                    if (currentY > pageHeight - 20) {
                        doc.addPage();
                        currentY = 20;
                    }
                    doc.text(line, margin, currentY);
                    currentY += 5.5;
                });

                currentY += 6; // Espaço para a próxima seção
            });

            const fileName = `dossie_completo_${dossieAtivo.nome_completo.toLowerCase().replace(/[^a-z0-9]/g, '_')}.pdf`;
            doc.save(fileName);
        });
    </script>
</body>
</html>
